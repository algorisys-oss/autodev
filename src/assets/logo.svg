<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset=".55" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#a21caf"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".18"/>
      <stop offset=".5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="232" fill="url(#sheen)"/>
  <!-- ghost chevron: a second, offset prompt behind the main one -> parallel agents -->
  <g fill="none" stroke="#ffffff" stroke-opacity=".26" stroke-width="70" stroke-linecap="round" stroke-linejoin="round" transform="translate(-96 -84)">
    <path d="M360 372 L604 512 L360 652"/>
  </g>
  <!-- main terminal prompt: >_ -->
  <g fill="none" stroke="#ffffff" stroke-width="76" stroke-linecap="round" stroke-linejoin="round">
    <path d="M360 372 L604 512 L360 652"/>
    <path d="M584 720 L748 720"/>
  </g>
</svg>
